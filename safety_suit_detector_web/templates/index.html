<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🛡️ Safety Suit Detector</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🛡️ Safety Suit Detector</h1>
        <p>Real-time detection of full-body safety suits</p>
      </header>

      <div class="tabs">
        <button class="tab-btn active" data-tab="image">📷 Image Upload</button>
        <button class="tab-btn" data-tab="webcam">🎥 Live Webcam</button>
      </div>

      <!-- Image Upload Tab -->
      <div id="image-tab" class="tab-content active">
        <div class="upload-area" id="drop-zone">
          <input type="file" id="image-input" accept="image/*" hidden />
          <div class="upload-prompt">
            <span class="icon">📁</span>
            <p>Drag & drop an image or click to browse</p>
            <small>Supports JPG, PNG, WEBP</small>
          </div>
        </div>
        <button id="detect-btn" class="detect-btn" disabled>
          Detect Safety Suit
        </button>
        <div id="image-result" class="result-area" style="display: none">
          <h3>🔍 Detection Result</h3>
          <img id="result-image" src="" alt="Detection result" />
          <div id="detection-info"></div>
        </div>
      </div>

      <!-- Webcam Tab -->
      <div id="webcam-tab" class="tab-content">
        <div class="webcam-container">
          <video id="webcam-video" autoplay playsinline></video>
          <canvas id="webcam-canvas" style="display: none"></canvas>
          <div id="webcam-result" class="result-area" style="display: none">
            <img id="webcam-result-image" src="" alt="Webcam detection" />
          </div>
        </div>
        <div class="webcam-controls">
          <button id="start-webcam" class="control-btn">▶️ Start Camera</button>
          <button id="capture-btn" class="control-btn" disabled>
            📸 Capture & Detect
          </button>
          <button id="stop-webcam" class="control-btn" disabled>⏹️ Stop</button>
        </div>
        <div id="webcam-status" class="status"></div>
      </div>

      <footer>
        <p>Model: YOLOv8s • mAP@0.5: 0.991 • Recall: 100%</p>
      </footer>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
